# RDS PostgreSQL credentials for n8n.
# POSTGRES_NON_ROOT_USER / POSTGRES_NON_ROOT_PASSWORD must match the RDS user you created for n8n.
# Replace the placeholder values below with your actual RDS credentials before applying.
apiVersion: v1
kind: Secret
metadata:
  namespace: n8n
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_NON_ROOT_USER: n8nusr
  POSTGRES_NON_ROOT_PASSWORD: dev123