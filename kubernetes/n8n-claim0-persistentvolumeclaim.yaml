# Uses EFS via n8n-efs StorageClass (ReadWriteMany for multi-AZ/shared storage).
# Requires: n8n-storageclass.yaml applied and fileSystemId set to your EFS ID.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    service: n8n-claim0
  name: n8n-claim0
  namespace: n8n
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: n8n-efs
  resources:
    requests:
      storage: 2Gi
